        def repoUrl = dotenv['REPO_URL'] ?: ""
        def repoUsername = dotenv['REPO_USERNAME'] ?: ""
        def repoPassword = dotenv['REPO_PASSWORD'] ?: ""

        if (!repoUrl.isEmpty() && repoUrl.startsWith("https://")) {
            maven {
                url repoUrl
                credentials {
                    username = repoUsername
                    password = repoPassword
                }
                // Logging for debugging purposes
                println "Maven repository URL E: $repoUrl"
                println "Maven repository username E: $repoUsername"
                println "Maven repository password E: $repoPassword"
            }
        }else {
            println "Invalid repository URL or missing credentials in .env file"
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
