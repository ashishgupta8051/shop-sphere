// Load credentials from the .env file
def dotenv = new Properties()
def dotenvFile = rootProject.file("../sign3Credential.env")
println "File Path E: ${dotenvFile.absolutePath}"
if (dotenvFile.exists()) {
    dotenvFile.withInputStream { stream ->
        dotenv.load(stream)
    }
}else {
    println "Not found .env file"
}

